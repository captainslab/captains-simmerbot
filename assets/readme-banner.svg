<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Simmer BTC Sprint Bot</title>
  <desc id="desc">Dark gradient banner for the BTC Sprint Bot repository</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="40" x2="1120" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="0.55" stop-color="#F97316"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 H 0 V 48" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <circle cx="1020" cy="80" r="180" fill="#F59E0B" fill-opacity="0.08"/>
  <circle cx="1080" cy="275" r="120" fill="#22C55E" fill-opacity="0.08"/>
  <g filter="url(#shadow)">
    <rect x="68" y="64" width="1064" height="232" rx="24" fill="#0B1220" fill-opacity="0.78" stroke="url(#accent)" stroke-opacity="0.38"/>
  </g>
  <circle cx="132" cy="128" r="34" fill="url(#accent)"/>
  <path d="M122 108H141C149.284 108 156 114.716 156 123V133C156 141.284 149.284 148 141 148H128V158H118V108H122Z" fill="#07111F" fill-opacity="0.92"/>
  <text x="188" y="130" fill="#F9FAFB" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" letter-spacing="0.2">
    Simmer BTC Sprint Bot
  </text>
  <text x="188" y="171" fill="#D1D5DB" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="500">
    BTC-only. Dry-run-first. Discord-native. Built for people who want a bot they can actually run and improve.
  </text>
  <g>
    <rect x="188" y="214" width="180" height="42" rx="21" fill="#F59E0B" fill-opacity="0.16" stroke="#F59E0B" stroke-opacity="0.38"/>
    <text x="208" y="241" fill="#FDE68A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600">Natural language control</text>
    <rect x="380" y="214" width="150" height="42" rx="21" fill="#22C55E" fill-opacity="0.14" stroke="#22C55E" stroke-opacity="0.35"/>
    <text x="404" y="241" fill="#BBF7D0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600">Deterministic risk</text>
    <rect x="542" y="214" width="142" height="42" rx="21" fill="#60A5FA" fill-opacity="0.14" stroke="#60A5FA" stroke-opacity="0.35"/>
    <text x="566" y="241" fill="#DBEAFE" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600">Journal + updates</text>
  </g>
  <path d="M780 102L945 102" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M780 102L945 168" stroke="#F59E0B" stroke-opacity="0.28" stroke-width="3" stroke-linecap="round"/>
  <path d="M780 102L945 236" stroke="#22C55E" stroke-opacity="0.28" stroke-width="3" stroke-linecap="round"/>
  <text x="792" y="140" fill="#F9FAFB" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">BTC</text>
  <text x="840" y="140" fill="#D1D5DB" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="500">scan</text>
  <text x="792" y="206" fill="#F9FAFB" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">risk</text>
  <text x="840" y="206" fill="#D1D5DB" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="500">gate</text>
  <text x="792" y="274" fill="#F9FAFB" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">Discord</text>
  <text x="895" y="274" fill="#D1D5DB" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="500">control</text>
</svg>
